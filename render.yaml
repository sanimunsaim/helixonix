services:
  - type: web
    name: helixonix-core-api
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run db:migrate && npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: helixonix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: helixonix-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: helixonix-db
    databaseName: helixonix
    user: postgres
    plan: free

  - type: redis
    name: helixonix-redis
    plan: free
